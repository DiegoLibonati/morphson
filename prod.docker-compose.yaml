version: "3.9"

services:
  client:
    build:
      context: ./json-client
      dockerfile: Dockerfile.production 
    restart: always
    ports:
      - "80:80"                         
    env_file:
      - ./json-client/.env.production
    networks:
      - net-json-transformer
    depends_on:
      - api

  api:
    build:
      context: ./json-api
      dockerfile: Dockerfile.production  
    restart: always
    expose:
      - "3000"                         
    env_file:
      ./json-api/.env.production
    networks:
      - net-json-transformer
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: jsondb
    volumes:
      - ./data:/var/lib/postgresql/data
    networks:
      - net-json-transformer
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d jsondb"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  net-json-transformer:
    name: net-json-transformer
