services:
  morphson-app:
    build:
      context: ./morphson-app
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./morphson-app/.env
    depends_on:
      - morphson-api
    ports:
      - 3000:8080
    networks:
      - morphson-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  morphson-api:
    build:
      context: ./morphson-api
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./morphson-api/.env
    depends_on:
      morphson-db:
        condition: service_healthy
    expose:
      - 5050:5050
    networks:
      - morphson-net

  morphson-db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - morphson-net

volumes:
  db-data:
    driver: local

networks:
  morphson-net:
    name: morphson-net
    driver: bridge
